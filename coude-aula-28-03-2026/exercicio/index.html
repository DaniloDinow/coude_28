<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Navegação</title>
    
</head>
<script>
function trocarClasse() {
  const caixa = document.getElementById("cards");
  
  // Alterna entre as classes
  if (caixa.classList.contains("around")) {
    caixa.className = "between";
  } else {
    caixa.className = "around";
  }
}
</script>
<body>
    <header>
        <nav>
            <div class="menu">
                <img src="" alt="Logo"> Olha o Site do Homi
            </div>
            <div class="menu-links">
                <span>Inicio</span>
                <span>Sobre</span>
                <span>Contato</span>
            </div>
        </nav>
    </header>
    <main>
        <section id="cards" class="between">
            <card>CARD 1</card>
            <card>CARD 2</card>
            <card>CARD 3</card>
            <card>CARD 4</card>
            <card>CARD 5</card>
            <card>CARD 6</card>
            <card>CARD 7</card>
            <card>CARD 8</card>
        </section>
        <section>
            <button onclick="trocarClasse()" style="cursor:pointer;">Trocar classe</button>
        </section>
    </main>
    <footer></footer>
    
</body>
</html>
